name: dota16
description: "16dota 战绩查询 & 好友列表"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络请求
  dio: ^5.8.0+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # 本地存储
  shared_preferences: ^2.5.3

  # 状态管理
  provider: ^6.1.5

  # 图表（雷达图）
  fl_chart: ^0.71.0

  # 工具
  intl: ^0.20.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

name: dota16
description: "16dota 战绩查询 & 好友列表"
publish_to: 'none'
version: 0.1.0+100

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络请求
  dio: ^5.8.0+1
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # 本地存储
  shared_preferences: ^2.5.3

  # 状态管理
  provider: ^6.1.5

  # 图表（雷达图）
  fl_chart: ^0.71.0

  # 工具
  intl: ^0.20.2
  crypto: ^3.0.6

  # 本地 AI 推理
  flutter_gemma: ^0.3.0

  # 本地 DB（缓存 AI 总结）
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # 文件选择（模型本地导入）
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

name: Build & Release

on:
  # 推 tag（如 v1.0.0）时触发，自动创建 Release
  push:
    tags:
      - 'v*'
  # 也可以在 Actions 页面手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0）'
        required: false
        default: 'dev'

jobs:
  # ── Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: pub get
        run: flutter pub get

      # ── 有签名密钥时解码并配置 ───────────────────────────────────────
      - name: Setup signing (optional)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      # ── 无签名密钥时用 debug 签名构建（可安装，但 Play Store 不接受）─
      - name: Build APK
        run: |
          if [ -f android/key.properties ]; then
            flutter build apk --release
          else
            flutter build apk --debug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # ── iOS ───────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: pub get
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r9 16dota.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/16dota.ipa
          retention-days: 7

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    # 只有推 tag 时才发布 Release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist/ios

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "16dota ${{ github.ref_name }}"
          body: |
            ## 16dota ${{ github.ref_name }}

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `*.apk` | 直接安装（需开启"允许未知来源"） |
            | iOS | `16dota.ipa` | 无签名，需用 AltStore / Sideloadly 侧载 |

            ### iOS 安装方式
            1. 下载 [AltStore](https://altstore.io) 或 [Sideloadly](https://sideloadly.io)
            2. 连接设备，导入 `.ipa` 文件安装
          files: |
            dist/android/*.apk
            dist/ios/16dota.ipa
          draft: false
          prerelease: false
